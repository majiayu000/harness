name: PR Check

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write

jobs:
  pr-body:
    name: PR Description
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body is not empty
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ] || [ ${#PR_BODY} -lt 20 ]; then
            echo "::error::PR description is too short. Please describe what this PR does (minimum 20 characters)."
            exit 1
          fi
          echo "PR description looks good (${#PR_BODY} chars)."

  gemini-review:
    name: Gemini Re-review
    runs-on: ubuntu-latest
    if: github.event.action == 'synchronize' && vars.GEMINI_REVIEW_ENABLED == 'true'
    steps:
      - name: Request Gemini re-review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '/gemini review'
            });
